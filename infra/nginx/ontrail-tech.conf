# OnTrail.tech Nginx Configuration
# Runs alongside loppio.se without touching it
# Cert path: /etc/letsencrypt/live/api.ontrail.tech/

# HTTP -> HTTPS redirect for all ontrail.tech domains
server {
    listen 80;
    server_name ontrail.tech *.ontrail.tech;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# Main landing page: ontrail.tech
server {
    listen 443 ssl http2;
    server_name ontrail.tech www.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/api.ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ontrail.tech/privkey.pem;

    root /var/www/ontrail/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Web app: app.ontrail.tech
server {
    listen 443 ssl http2;
    server_name app.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/api.ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ontrail.tech/privkey.pem;

    root /var/www/ontrail/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API: api.ontrail.tech
server {
    listen 443 ssl http2;
    server_name api.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/api.ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ontrail.tech/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Wildcard: *.ontrail.tech -> runner profiles
# Catches any subdomain not matched above
server {
    listen 443 ssl http2;
    server_name ~^(?<username>.+)\.ontrail\.tech$;

    ssl_certificate /etc/letsencrypt/live/api.ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ontrail.tech/privkey.pem;

    # Serve the web app but pass the username to the frontend
    root /var/www/ontrail/apps/web/dist;
    index index.html;

    # API calls go to backend with username header
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Runner-Username $username;
    }

    # Runner profile lookup via API
    location = /runner-data {
        proxy_pass http://127.0.0.1:8100/users/runner/$username;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Runner-Username $username;
    }

    # Everything else serves the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
