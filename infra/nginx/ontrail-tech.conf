# OnTrail.tech Nginx Configuration
# Runs alongside loppio.se without touching it
# Wildcard cert: /etc/letsencrypt/live/ontrail.tech-0002/ (*.ontrail.tech + ontrail.tech)
# Cert type: ECDSA — requires ECDSA cipher suites (global nginx.conf only has RSA)

# HTTP -> HTTPS redirect for all ontrail.tech domains
server {
    listen 80;
    server_name ontrail.tech *.ontrail.tech;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# Apex + www: redirect to app.ontrail.tech
server {
    listen 443 ssl http2;
    server_name ontrail.tech www.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech-0002/privkey.pem;

    # ECDSA cert needs ECDSA ciphers (global nginx.conf only has ECDHE-RSA-*)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 308 https://app.ontrail.tech$request_uri;
}

# Web app: app.ontrail.tech
server {
    listen 443 ssl http2;
    server_name app.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech-0002/privkey.pem;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/ontrail/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API: api.ontrail.tech
server {
    listen 443 ssl http2;
    server_name api.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech-0002/privkey.pem;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Wildcard: *.ontrail.tech -> runner profiles
# Catches any subdomain not matched above (e.g. hansen.ontrail.tech)
server {
    listen 443 ssl http2;
    server_name ~^(?<username>.+)\.ontrail\.tech$;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech-0002/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech-0002/privkey.pem;

    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/ontrail/apps/web/dist;
    index index.html;

    # API calls go to backend with username header
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Runner-Username $username;
    }

    # Runner profile lookup via API
    location = /runner-data {
        proxy_pass http://127.0.0.1:8100/users/runner/$username;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Runner-Username $username;
    }

    # Everything else serves the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
