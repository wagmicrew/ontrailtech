# OnTrail Nginx Configuration
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Landing page
server {
    listen 80;
    server_name ontrail.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ontrail.tech www.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech/privkey.pem;
    return 308 https://app.ontrail.tech$request_uri;
}

# Web app
server {
    listen 80;
    server_name app.ontrail.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech/privkey.pem;

    root /var/www/ontrail/apps/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}


# API server
server {
    listen 80;
    server_name api.ontrail.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Data gateway
server {
    listen 80;
    server_name data.ontrail.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name data.ontrail.tech;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard runner profiles (*.ontrail.tech)
server {
    listen 80;
    server_name ~^(?<username>.+)\.ontrail\.tech$;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ~^(?<username>.+)\.ontrail\.tech$;

    ssl_certificate /etc/letsencrypt/live/ontrail.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontrail.tech/privkey.pem;

    # Serve the React app
    root /var/www/ontrail/apps/web/dist;
    index index.html;

    # Pass the runner username to the frontend via header
    add_header X-Runner-Username $username always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy for frontend requests
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
